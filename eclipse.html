<!DOCTYPE html>
<html>
<head>
  <title>Eclipse</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #08010f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh;
      font-family: 'Orbitron', monospace;
      overflow: hidden;
    }
    #ui {
      display: flex; gap: 32px; align-items: center;
      margin-bottom: 10px; padding: 8px 28px;
      background: rgba(20,5,40,0.85);
      border: 1px solid rgba(200,80,255,0.22);
      border-radius: 30px;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 18px rgba(150,30,255,0.18), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .ui-item { color: #e0c0ff; font-size: 14px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(180,60,255,0.7); }
    #score  { color: #ffcc44; text-shadow: 0 0 10px rgba(255,190,0,0.9); }
    #lives  { color: #ff8866; text-shadow: 0 0 10px rgba(255,100,50,0.9); }
    #power  { color: #cc88ff; font-size: 11px; letter-spacing: 1px; min-width: 90px; text-align: center; }
    #canvas-wrap {
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(160,40,255,0.3), 0 0 40px rgba(100,10,200,0.3);
    }
    canvas { display: block; border-radius: 4px; }
    #hint { color: rgba(160,90,220,0.65); margin-top: 10px; font-size: 11px; letter-spacing: 1.5px; }
    #back { color: rgba(120,60,180,0.6); margin-top: 6px; font-size: 11px; letter-spacing: 1px; text-decoration: none; }
    #back:hover { color: rgba(200,120,255,0.9); }
  </style>
</head>
<body>
  <div id="ui">
    <span class="ui-item" id="score">◆ 0</span>
    <span class="ui-item" id="levelui">LEVEL 1</span>
    <span class="ui-item" id="lives">● ● ●</span>
    <span class="ui-item" id="power">—</span>
  </div>
  <div id="canvas-wrap"><canvas id="game"></canvas></div>
  <div id="hint">← → Rotate Paddle &nbsp;·&nbsp; Space Launch &nbsp;·&nbsp; R Restart</div>
  <a id="back" href="index.html">← Back to Arcade</a>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 500;
const W = canvas.width, H = canvas.height;
const CX = W/2, CY = H/2;
const ARENA_R   = 208;
const PADDLE_ARC = 0.24;   // half-arc radians
const PADDLE_SPD = 0.046;
const BALL_SPD   = 5.4;
const ORB_R      = 11;

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── audio ──────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
document.addEventListener('keydown', () => AC.state === 'suspended' && AC.resume(), { once: true });
function tone(f1, f2, type, dur, vol) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type;
  o.frequency.setValueAtTime(f1, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(f2, AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}
const sndBounce  = () => tone(520, 780, 'sine',     0.055, 0.09);
const sndBreak   = () => tone(700, 180, 'square',   0.14,  0.17);
const sndMiss    = () => tone(320, 50,  'sawtooth', 0.5,   0.28);
const sndLaunch  = () => tone(220, 550, 'sine',     0.1,   0.16);
const sndPowerUp = () => { tone(660,1320,'sine',0.1,0.2); setTimeout(()=>tone(880,1760,'sine',0.08,0.14),90); };
const sndWin     = () => { [0,140,280,420].forEach(d=>setTimeout(()=>tone(440+d*3,880+d*3,'sine',0.16,0.18),d)); };

// ── helpers ────────────────────────────────────────────────────────────────
function normAngle(a) { return ((a % (Math.PI*2)) + Math.PI*2) % (Math.PI*2); }
function angleDelta(a, b) {
  let d = normAngle(b) - normAngle(a);
  if (d >  Math.PI) d -= Math.PI*2;
  if (d < -Math.PI) d += Math.PI*2;
  return d;
}
function hexDark(hex, f) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  const r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
  return `rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`;
}

// ── level data ──────────────────────────────────────────────────────────────
function ring(n, dist, color, hp=1, spd=0) {
  return Array.from({length:n}, (_,i) => ({
    a0: (i/n)*Math.PI*2, dist, color, hp, maxHp:hp, spd,
    r: ORB_R, pts: hp*10 + (spd?8:0),
  }));
}
function spiral(n, r0, r1, color, hp=1) {
  return Array.from({length:n}, (_,i) => ({
    a0: (i/n)*Math.PI*2*2.5, dist: r0 + (r1-r0)*(i/n),
    color, hp, maxHp:hp, spd:0, r:ORB_R, pts:hp*10,
  }));
}

const LEVELS = [
  { name: 'NOVA RING',
    bg: ['#08010f','#140225'],
    orbs: ring(12, 100, '#cc88ff', 1) },
  { name: 'TWIN ORBIT',
    bg: ['#0a0005','#190010'],
    orbs: [
      ...ring(8, 65, '#ff8844', 1),
      ...ring(14, 145, '#ff44aa', 2),
    ] },
  { name: 'STAR CLUSTER',
    bg: ['#050508','#0d0d1a'],
    orbs: [
      { a0:0, dist:0, color:'#ffdd44', hp:4, maxHp:4, spd:0, r:16, pts:80 },
      ...ring(6,  55, '#ffaa44', 2),
      ...ring(10, 110, '#ff6688', 2),
      ...ring(16, 160, '#8866ff', 1),
    ] },
  { name: 'VORTEX',
    bg: ['#030812','#07141f'],
    orbs: [
      ...ring(6,  50, '#44ffcc', 3, 0.009),
      ...ring(12, 110, '#44aaff', 2, -0.006),
      ...ring(18, 165, '#6644ff', 1,  0.004),
    ] },
  { name: 'ECLIPSE CORE',
    bg: ['#080004','#140008'],
    orbs: [
      { a0:0, dist:0, color:'#ffffff', hp:8, maxHp:8, spd:0, r:20, pts:200 },
      ...ring(5,  38, '#ff4444', 4, 0.014),
      ...ring(10, 88, '#ff8833', 3, -0.009),
      ...ring(16, 148, '#ffcc44', 2,  0.006),
      ...ring(5,  175, '#ff44aa', 1, -0.012),
    ] },
];

// ── state ──────────────────────────────────────────────────────────────────
let score, lives, level, gameState, shake;
let paddleAngle, balls, orbs, particles, powerUps, activePower, powerTimer;
let waiting, transitionTimer;

function spawnParticles(x, y, color, n, spd, sz) {
  for (let i=0; i<n; i++) {
    const a = Math.random()*Math.PI*2, s = spd*(0.4+Math.random()*0.8);
    particles.push({ x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, color, sz });
  }
}

// ── init / load ────────────────────────────────────────────────────────────
function loadLevel() {
  const L = LEVELS[level];
  orbs = L.orbs.map(o => ({ ...o, t:0,
    x: CX + Math.cos(o.a0)*o.dist,
    y: CY + Math.sin(o.a0)*o.dist,
  }));
  particles = []; powerUps = []; activePower = null; powerTimer = 0;
  paddleAngle = Math.PI/2;
  waiting = true;
  gameState = 'playing';
  resetBalls();
  updateUI();
}

function resetBalls() {
  waiting = true;
  const bx = CX + Math.cos(paddleAngle)*(ARENA_R-10);
  const by = CY + Math.sin(paddleAngle)*(ARENA_R-10);
  balls = [{ x:bx, y:by, vx:0, vy:0, trail:[] }];
}

function init() {
  score=0; lives=3; level=0; shake=0; transitionTimer=0;
  loadLevel();
}

// ── update ─────────────────────────────────────────────────────────────────
function update() {
  if (shake>0) shake-=0.7;

  if (gameState === 'transition') {
    if (--transitionTimer <= 0) { level++; loadLevel(); }
    tickParticles(); return;
  }
  if (gameState !== 'playing') return;

  // paddle
  if (keys['ArrowLeft']  || keys['KeyA']) paddleAngle -= PADDLE_SPD;
  if (keys['ArrowRight'] || keys['KeyD']) paddleAngle += PADDLE_SPD;
  paddleAngle = normAngle(paddleAngle);

  // power timer
  if (activePower && --powerTimer <= 0) { activePower=null; updateUI(); }

  // launch
  if (waiting) {
    const bx = CX + Math.cos(paddleAngle)*(ARENA_R-10);
    const by = CY + Math.sin(paddleAngle)*(ARENA_R-10);
    balls[0].x = bx; balls[0].y = by;
    if (keys['Space'] && !keys['_sh']) {
      keys['_sh'] = true; waiting = false;
      const la = paddleAngle + Math.PI + (Math.random()-0.5)*0.55;
      balls[0].vx = Math.cos(la)*BALL_SPD;
      balls[0].vy = Math.sin(la)*BALL_SPD;
      sndLaunch();
    }
    if (!keys['Space']) keys['_sh'] = false;
    updateOrbs(); tickParticles(); tickPowerUps(); return;
  }
  if (!keys['Space']) keys['_sh'] = false;

  updateOrbs();

  for (let bi = balls.length-1; bi >= 0; bi--) {
    const b = balls[bi];
    b.trail.push({x:b.x, y:b.y});
    if (b.trail.length > 16) b.trail.shift();
    b.x += b.vx; b.y += b.vy;

    // orb collisions
    for (let oi = orbs.length-1; oi >= 0; oi--) {
      const o = orbs[oi];
      const dx = b.x-o.x, dy = b.y-o.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      const minD = 6 + o.r;
      if (d < minD && d > 0.01) {
        const nx = dx/d, ny = dy/d;
        const dot = b.vx*nx + b.vy*ny;
        if (dot < 0) { // only if approaching
          b.vx -= 2*dot*nx; b.vy -= 2*dot*ny;
        }
        // push out
        const ov = minD - d;
        b.x += nx*ov; b.y += ny*ov;
        // maintain speed
        const spd = Math.sqrt(b.vx*b.vx+b.vy*b.vy);
        if (spd > 0.1) { b.vx=b.vx/spd*BALL_SPD; b.vy=b.vy/spd*BALL_SPD; }

        o.hp--;
        spawnParticles(o.x, o.y, o.color, 7, 3.5, 2.5);

        if (o.hp <= 0) {
          score += o.pts;
          spawnParticles(o.x, o.y, o.color, 18, 5, 4);
          spawnParticles(o.x, o.y, '#ffffff', 8, 7, 2);
          shake = Math.max(shake, 5);
          // power-up drop
          if (Math.random() < 0.28) {
            const types = ['multi','wide','slow'];
            powerUps.push({
              x:o.x, y:o.y,
              vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2,
              type: types[Math.floor(Math.random()*3)],
              life:1, age:0,
            });
          }
          orbs.splice(oi, 1);
          sndBreak();
          updateUI();
          if (orbs.length === 0) {
            sndWin();
            spawnParticles(CX,CY,'#ffcc44',30,6,4);
            spawnParticles(CX,CY,'#ffffff',15,8,2);
            if (level >= LEVELS.length-1) { gameState='win'; return; }
            gameState='transition'; transitionTimer=110; return;
          }
        } else {
          sndBounce();
        }
      }
    }

    // arena wall
    const dx = b.x-CX, dy = b.y-CY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist >= ARENA_R-6) {
      const nx = dx/dist, ny = dy/dist; // outward normal
      const ballA = normAngle(Math.atan2(dy, dx));
      const pa    = normAngle(paddleAngle);
      let diff = Math.abs(angleDelta(pa, ballA));

      const halfArc = PADDLE_ARC + (activePower==='wide' ? 0.22 : 0);
      const caught = diff <= halfArc;

      if (caught) {
        // reflect inward (normal points outward, so negate for inward)
        const dot = b.vx*nx + b.vy*ny;
        b.vx -= 2*dot*nx; b.vy -= 2*dot*ny;
        // spin based on offset from paddle center
        const spin = angleDelta(pa, ballA) / halfArc;
        const tx=-ny, ty=nx;
        b.vx += tx*spin*1.8; b.vy += ty*spin*1.8;
        // normalize speed
        const spd = Math.sqrt(b.vx*b.vx+b.vy*b.vy);
        const tSpd = activePower==='slow' ? BALL_SPD*0.62 : BALL_SPD;
        if (spd>0.1){ b.vx=b.vx/spd*tSpd; b.vy=b.vy/spd*tSpd; }
        // push in
        b.x -= nx*(dist-(ARENA_R-10));
        b.y -= ny*(dist-(ARENA_R-10));
        sndBounce();

        // multi-ball activation
        if (activePower==='multi' && balls.length < 4) {
          activePower=null; powerTimer=0;
          const perp = { vx: -b.vy*0.9, vy: b.vx*0.9 };
          const s2 = Math.sqrt(perp.vx*perp.vx+perp.vy*perp.vy);
          balls.push({ x:b.x, y:b.y, vx:perp.vx/s2*BALL_SPD, vy:perp.vy/s2*BALL_SPD, trail:[] });
          spawnParticles(b.x,b.y,'#dd88ff',14,4,3);
          sndPowerUp(); updateUI();
        }
      } else {
        // missed
        spawnParticles(b.x,b.y,'#ff4422',10,4,3);
        balls.splice(bi,1); shake=Math.max(shake,12);
        if (balls.length===0) {
          sndMiss(); lives--;
          updateUI();
          if (lives<=0) { gameState='gameover'; return; }
          resetBalls();
        }
        break;
      }
    }
  }

  tickPowerUps(); tickParticles(); updateUI();
}

function updateOrbs() {
  for (const o of orbs) {
    if (o.spd) {
      o.t += o.spd;
      o.x = CX + Math.cos(o.a0+o.t)*o.dist;
      o.y = CY + Math.sin(o.a0+o.t)*o.dist;
    }
  }
}

function tickPowerUps() {
  const px = CX + Math.cos(paddleAngle)*(ARENA_R-28);
  const py = CY + Math.sin(paddleAngle)*(ARENA_R-28);
  for (let i=powerUps.length-1; i>=0; i--) {
    const p = powerUps[i];
    p.age++;
    // drift toward paddle
    const dx=px-p.x, dy=py-p.y, dd=Math.sqrt(dx*dx+dy*dy);
    if (dd>0) { p.vx += dx/dd*0.12; p.vy += dy/dd*0.12; }
    p.vx*=0.97; p.vy*=0.97;
    p.x+=p.vx; p.y+=p.vy;
    p.life -= 0.004;
    // collect
    if (dd < 22) {
      activePower = p.type; powerTimer = 480;
      powerUps.splice(i,1);
      spawnParticles(p.x,p.y,'#ffcc44',12,4,3);
      sndPowerUp(); updateUI(); continue;
    }
    // bounce off arena wall
    const od = Math.sqrt((p.x-CX)**2+(p.y-CY)**2);
    if (od > ARENA_R-14) {
      const onx=(p.x-CX)/od, ony=(p.y-CY)/od;
      const dot=p.vx*onx+p.vy*ony;
      if(dot>0){ p.vx-=2*dot*onx; p.vy-=2*dot*ony; }
    }
    if (p.life<=0) powerUps.splice(i,1);
  }
}

function tickParticles() {
  for (let i=particles.length-1; i>=0; i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.96; p.vy*=0.96;
    p.life-=0.024;
    if(p.life<=0) particles.splice(i,1);
  }
}

function updateUI() {
  document.getElementById('score').textContent   = `◆ ${score}`;
  document.getElementById('levelui').textContent = `LEVEL ${level+1}`;
  document.getElementById('lives').textContent   = '● '.repeat(Math.max(lives,0)).trim()||'☠';
  const pe = document.getElementById('power');
  const names = { multi:'✦ MULTI', wide:'↔ WIDE', slow:'⊙ SLOW' };
  pe.textContent = activePower ? names[activePower] : '—';
}

// ── draw ───────────────────────────────────────────────────────────────────
function draw() {
  const sx=shake?(Math.random()-0.5)*shake:0, sy=shake?(Math.random()-0.5)*shake:0;
  ctx.save(); ctx.translate(sx,sy);
  drawBg(); drawArena(); drawOrbs(); drawPowerUps();
  for (const b of balls) drawBall(b);
  drawPaddle(); drawParticles(); drawVignette();
  drawOverlay();
  ctx.restore();
}

function drawBg() {
  const L = LEVELS[Math.min(level,LEVELS.length-1)];
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,L.bg[0]); g.addColorStop(1,L.bg[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  const t=Date.now()/10000;
  for (let i=0;i<3;i++) {
    const nx=CX+Math.sin(i*2.1+t)*110, ny=CY+Math.cos(i*1.7+t*.8)*80;
    const ng=ctx.createRadialGradient(nx,ny,0,nx,ny,130+i*30);
    ng.addColorStop(0,'rgba(130,20,220,0.07)'); ng.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ng; ctx.fillRect(0,0,W,H);
  }
  const r=n=>{const x=Math.sin(n)*9999;return x-Math.floor(x);};
  for(let i=0;i<100;i++){ctx.fillStyle=`rgba(255,255,255,${0.08+r(i*2.3)*0.4})`;ctx.fillRect(r(i*3.1)*W,r(i*7.3)*H,1,1);}
  for(let i=0;i<28;i++){const tw=0.3+Math.sin(Date.now()/1300+i*1.2)*0.38;ctx.fillStyle=`rgba(220,180,255,${tw})`;ctx.fillRect(r(i*5.7)*W,r(i*9.1)*H,1.5,1.5);}
}

function drawArena() {
  // outer glow halo
  const hg=ctx.createRadialGradient(CX,CY,ARENA_R-4,CX,CY,ARENA_R+18);
  hg.addColorStop(0,'rgba(170,50,255,0.18)'); hg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(CX,CY,ARENA_R+18,0,Math.PI*2); ctx.fill();

  // arena ring
  ctx.beginPath(); ctx.arc(CX,CY,ARENA_R,0,Math.PI*2);
  ctx.strokeStyle='rgba(190,70,255,0.28)'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(CX,CY,ARENA_R,0,Math.PI*2);
  ctx.strokeStyle='rgba(220,100,255,0.09)'; ctx.lineWidth=10; ctx.stroke();

  // faint center guides
  ctx.strokeStyle='rgba(150,50,255,0.07)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(CX-22,CY); ctx.lineTo(CX+22,CY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX,CY-22); ctx.lineTo(CX,CY+22); ctx.stroke();
  ctx.beginPath(); ctx.arc(CX,CY,40,0,Math.PI*2);
  ctx.strokeStyle='rgba(150,50,255,0.05)'; ctx.lineWidth=1; ctx.stroke();
}

function drawOrbs() {
  const t=Date.now()/650;
  for (const o of orbs) {
    const pulse = 1 + Math.sin(t + o.a0*3)*0.09;
    ctx.save(); ctx.translate(o.x,o.y);

    // outer glow
    const gg=ctx.createRadialGradient(0,0,o.r*.4,0,0,o.r*2.4*pulse);
    gg.addColorStop(0,o.color+'55'); gg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(0,0,o.r*2.4*pulse,0,Math.PI*2); ctx.fill();

    // main sphere gradient
    const sg=ctx.createRadialGradient(-o.r*.32,-o.r*.32,0,0,0,o.r*pulse);
    sg.addColorStop(0,'rgba(255,255,255,0.65)');
    sg.addColorStop(0.35,o.color);
    sg.addColorStop(1, hexDark(o.color,0.35));
    ctx.fillStyle=sg;
    ctx.shadowColor=o.color; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(0,0,o.r*pulse,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // hp crack marks
    if (o.maxHp>1 && o.hp<o.maxHp) {
      ctx.strokeStyle=`rgba(0,0,0,${(1-o.hp/o.maxHp)*0.7})`;
      ctx.lineWidth=1.5;
      for (let c=o.hp;c<o.maxHp;c++) {
        const ca=(c/o.maxHp)*Math.PI*2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(ca)*2,Math.sin(ca)*2);
        ctx.lineTo(Math.cos(ca)*(o.r*.92),Math.sin(ca)*(o.r*.92));
        ctx.stroke();
      }
    }
    ctx.restore();
  }
}

function drawPaddle() {
  const pa = paddleAngle;
  const half = PADDLE_ARC + (activePower==='wide'?0.22:0);

  // glow halo behind paddle
  ctx.beginPath(); ctx.arc(CX,CY,ARENA_R,pa-half-0.05,pa+half+0.05);
  ctx.strokeStyle='rgba(255,120,255,0.14)'; ctx.lineWidth=16; ctx.lineCap='round'; ctx.stroke();

  // paddle body
  ctx.beginPath(); ctx.arc(CX,CY,ARENA_R,pa-half,pa+half);
  ctx.strokeStyle=activePower==='wide'?'#88ffff':'#ff88ff';
  ctx.lineWidth=7; ctx.lineCap='round';
  ctx.shadowColor=activePower==='wide'?'#44ffff':'#ff44ff'; ctx.shadowBlur=14;
  ctx.stroke(); ctx.shadowBlur=0;

  // paddle highlight
  ctx.beginPath(); ctx.arc(CX,CY,ARENA_R,pa-half*0.5,pa+half*0.5);
  ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=2; ctx.stroke();

  // tip dot
  const tipX=CX+Math.cos(pa)*ARENA_R, tipY=CY+Math.sin(pa)*ARENA_R;
  ctx.fillStyle='#ffffff'; ctx.shadowColor='#ff88ff'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.arc(tipX,tipY,3.5,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // launch aim line when waiting
  if (waiting) {
    const la = pa+Math.PI;
    ctx.strokeStyle='rgba(255,180,255,0.2)'; ctx.lineWidth=1.5;
    ctx.setLineDash([6,8]);
    ctx.beginPath();
    ctx.moveTo(CX+Math.cos(pa)*(ARENA_R-12), CY+Math.sin(pa)*(ARENA_R-12));
    ctx.lineTo(CX+Math.cos(la)*60, CY+Math.sin(la)*60);
    ctx.stroke(); ctx.setLineDash([]);
  }
}

function drawBall(b) {
  // trail
  for (let i=0;i<b.trail.length;i++) {
    const tr=b.trail[i];
    ctx.globalAlpha=(i/b.trail.length)*0.3;
    ctx.fillStyle='#ee88ff';
    ctx.beginPath(); ctx.arc(tr.x,tr.y,4,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // ball glow
  ctx.shadowColor='#ff88ff'; ctx.shadowBlur=20;
  const bg=ctx.createRadialGradient(b.x-2,b.y-2,0,b.x,b.y,6);
  bg.addColorStop(0,'rgba(255,255,255,1)');
  bg.addColorStop(0.45,'rgba(255,160,255,0.95)');
  bg.addColorStop(1,'rgba(180,40,255,0.6)');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.arc(b.x,b.y,6,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
}

function drawPowerUps() {
  const t=Date.now()/500;
  const colors={multi:'#ffcc44',wide:'#44ccff',slow:'#88ff88'};
  const syms={multi:'✦',wide:'↔',slow:'⊙'};
  for (const p of powerUps) {
    ctx.save(); ctx.globalAlpha=Math.min(1,p.life*2);
    ctx.translate(p.x,p.y); ctx.rotate(t);
    const c=colors[p.type]||'#ffffff';
    ctx.shadowColor=c; ctx.shadowBlur=10;
    ctx.strokeStyle=c; ctx.lineWidth=1.8;
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*9,Math.sin(a)*9):ctx.lineTo(Math.cos(a)*9,Math.sin(a)*9);}
    ctx.closePath(); ctx.stroke();
    ctx.font='9px Orbitron,monospace'; ctx.fillStyle=c; ctx.textAlign='center';
    ctx.fillText(syms[p.type]||'?',0,3);
    ctx.shadowBlur=0; ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawVignette() {
  const vg=ctx.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,H*.9);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,12,0.6)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

function drawOverlay() {
  if (gameState==='playing') {
    if (waiting) {
      ctx.textAlign='center'; ctx.fillStyle='rgba(210,160,255,0.75)';
      ctx.font='11px Orbitron,monospace';
      ctx.shadowColor='#cc88ff'; ctx.shadowBlur=8;
      ctx.fillText('SPACE TO LAUNCH', CX, H-28);
      ctx.shadowBlur=0;
    }
    return;
  }
  if (gameState==='transition') {
    ctx.fillStyle='rgba(0,0,15,0.72)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#cc88ff'; ctx.font='bold 13px Orbitron,monospace';
    ctx.fillText('LEVEL CLEAR', CX, CY-22);
    ctx.fillStyle='#ffffff'; ctx.font='bold 30px Orbitron,monospace';
    ctx.shadowColor='#cc44ff'; ctx.shadowBlur=20;
    ctx.fillText(LEVELS[level+1]?.name||'', CX, CY+16);
    ctx.shadowBlur=0;
    return;
  }
  ctx.fillStyle='rgba(0,0,15,0.84)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  if (gameState==='win') {
    ctx.shadowColor='#ffcc44'; ctx.shadowBlur=32;
    ctx.fillStyle='#ffe040'; ctx.font='bold 54px Orbitron,monospace';
    ctx.fillText('ECLIPSE!', CX, CY-44);
  } else {
    ctx.shadowColor='#ff4466'; ctx.shadowBlur=32;
    ctx.fillStyle='#ff4466'; ctx.font='bold 50px Orbitron,monospace';
    ctx.fillText('GAME OVER', CX, CY-44);
  }
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffffff'; ctx.font='22px Orbitron,monospace';
  ctx.fillText(`Score: ${score}`, CX, CY+18);
  ctx.fillStyle='rgba(180,130,220,0.8)'; ctx.font='13px Orbitron,monospace';
  ctx.fillText('Press R to restart', CX, CY+58);
}

document.addEventListener('keydown', e => {
  if (e.code==='KeyR' && (gameState==='gameover'||gameState==='win')) init();
});

function loop() { update(); draw(); requestAnimationFrame(loop); }
init(); loop();
</script>
</body>
</html>
